<html lang="en">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* 2026 PURPLE RISING - ANNIVERSARY EDITION */
        body { 
            background: radial-gradient(circle, #241773 0%, #120a3d 100%); 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .playbook-card { 
            background: rgba(0, 0, 0, 0.95); 
            border: 4px solid #9E7C0C; 
            width: 380px; 
            padding: 25px; 
            border-radius: 24px; 
            text-align: center; 
            box-shadow: 0 0 40px #241773; 
        }
        .header { border-bottom: 2px solid #9E7C0C; margin-bottom: 15px; padding-bottom: 10px; }
        .header h2 { margin: 0; color: #fbca04; font-size: 22px; letter-spacing: 2px; text-transform: uppercase; }
        
        .display-area { 
            background: #241773; 
            border: 2px solid #fbca04; 
            padding: 20px; 
            margin: 15px 0; 
            border-radius: 15px; 
            min-height: 120px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
        }
        #suggestion { font-size: 42px; font-weight: 900; color: #fbca04; margin: 0; text-shadow: 2px 2px #000; }
        #reasoning { font-size: 13px; color: #ccc; margin-top: 8px; font-style: italic; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        /* Gold Facemask Theme Buttons */
        button { 
            background: #9E7C0C; 
            color: #000; 
            border: 1px solid #fbca04; 
            padding: 14px; 
            cursor: pointer; 
            font-size: 12px; 
            border-radius: 10px; 
            font-weight: 800;
            text-transform: uppercase; 
            transition: all 0.2s ease;
        }
        button:hover { background: #fbca04; transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        
        .tone-btn { background: #5d48a1; color: white; border-color: #9E7C0C; }
        .dist-btn { grid-column: span 2; background: #fff; color: #000; margin: 5px 0; }
        .reset-btn { background: #C60C30; color: white; grid-column: span 2; border: none; margin-top: 15px; opacity: 0.8; }
        .reset-btn:hover { opacity: 1; }
