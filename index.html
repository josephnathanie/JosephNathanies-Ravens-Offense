<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASK JOSEPH: RAVENS JOSEPHNATHANIE</title>
    <style>
        body { 
            background: radial-gradient(circle, #241773 0%, #120a3d 100%); 
            color: white; font-family: 'Arial Black', sans-serif; 
            display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; 
        }
        .playbook-card { 
            background: rgba(0, 0, 0, 0.95); border: 4px solid #9E7C0C; 
            width: 380px; padding: 25px; border-radius: 20px; text-align: center; box-shadow: 0 0 40px #241773; 
        }
        
        /* 30TH ANNIVERSARY LOGO STYLE */
        .anniversary-logo { 
            width: 90px; height: auto; margin-bottom: 10px; 
            filter: drop-shadow(0 0 10px #fbca04); /* Gives the logo a slight gold glow */
        }
        
        .display { 
            background: #241773; border: 2px solid #fbca04; padding: 20px; 
            margin: 20px 0; border-radius: 12px; min-height: 110px; display: flex; flex-direction: column; justify-content: center;
        }
        #suggestion { font-size: 42px; color: #fbca04; margin: 0; text-shadow: 2px 2px #000; }
        #reasoning { font-size: 13px; color: #ccc; margin-top: 10px; font-family: 'Segoe UI', sans-serif; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        button { 
            background: #9E7C0C; color: black; border: 2px solid #fbca04; 
            padding: 14px; cursor: pointer; font-size: 13px; border-radius: 8px; font-weight: 900;
        }
        button:hover { background: #fbca04; transform: scale(1.02); }
        .dist-btn { grid-column: span 2; background: #fff; color: #000; border: none; margin-bottom: 5px; }
        .reset-btn { background: #C60C30; color: white; grid-column: span 2; margin-top: 10px; border: none; }
    </style>
</head>
<body onload="play(1)">

<div class="playbook-card">
    
    <img src="ravens-30th.png" alt="Ravens 30th Anniversary" class="anniversary-logo">

    <h2 style="margin:0; color:#fbca04; letter-spacing: 2px;">ASK JOSEPH</h2>
    <p style="margin:0; font-size: 11px; color:#fff;">RAVENS JOSEPHNATHANIE OFFENSE</p>
    
    <div class="display">
        <h1 id="suggestion">...</h1>
        <p id="reasoning">Initializing Playbook...</p>
    </div>

    <div class="grid">
        <button class="dist-btn" onclick="setDist()">SET DISTANCE (AND ?)</button>
        <button onclick="play(1)">1ST DOWN</button>
        <button onclick="play(2)">2ND DOWN</button>
        <button onclick="play(3)">3RD DOWN</button>
        <button onclick="play(4)">4TH DOWN</button>
        <button onclick="reset()" class="reset-btn">RESET DRIVE</button>
    </div>
</div>

<script>
    let yards = 10;
    let lastPlayType = "PASS"; // Default for 1st down

    function setDist() {
        let input = prompt("Yards to go?");
        if (input !== null && input !== "") {
            yards = parseInt(input);
            updateUIByDistance();
        }
    }

    function updateUIByDistance() {
        if (yards === 5) {
            document.getElementById('suggestion').innerText = lastPlayType;
            document.getElementById('reasoning').innerText = "AND 5: REPEAT PREVIOUS DOWN (RUN/PASS: " + lastPlayType + ")";
        } else {
            document.getElementById('suggestion').innerText = yards + " YARDS";
            document.getElementById('reasoning').innerText = "Select Down for Play Call";
        }
    }

    function play(down) {
        let call = "";
        let note = "";

        // AND 5 LOGIC
        if (yards === 5) {
            call = lastPlayType;
            note = "AND 5: REPEAT PREVIOUS DOWN (RUN/PASS: " + lastPlayType + ")";
        } 
        // 1ST DOWN
        else if (down === 1) {
            call = "PASS";
            note = "1st Down: Always Pass.";
        } 
        // 2ND DOWN
        else if (down === 2) {
            if (yards < 5) {
                call = "PASS";
                note = "2nd & Less than 5: Pass.";
            } else if (yards > 5) {
                call = "RUN";
                note = "2nd & More than 5: Run.";
            }
        } 
        // 3RD DOWN
        else if (down === 3) {
            if (yards < 5) {
                call = "RUN";
                note = "3rd & Less than 5: Run.";
            } else if (yards > 5) {
                call = "PASS";
                note = "3rd & More than 5: Pass.";
            }
        } 
        // 4TH DOWN
        else if (down === 4) {
            call = "SPECIAL TEAMS";
            note = "Consult Special Teams Coach.";
        }

        // Memory Update
        if (call === "PASS" || call === "RUN") {
            lastPlayType = call;
        }

        document.getElementById('suggestion').innerText = call;
        document.getElementById('reasoning').innerText = note;
    }

    function reset() {
        yards = 10;
        lastPlayType = "PASS";
        play(1);
    }
</script>
</body>
</html>
