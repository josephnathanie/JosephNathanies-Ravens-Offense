<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ravens: Josephnathanie 30th Season</title>
    <style>
        body { 
            background: radial-gradient(circle, #241773 0%, #120a3d 100%); 
            color: white; 
            font-family: 'Arial Black', sans-serif; 
            display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; 
        }
        .playbook-card { 
            background: rgba(0, 0, 0, 0.95); border: 4px solid #9E7C0C; width: 380px; 
            padding: 25px; border-radius: 24px; text-align: center; box-shadow: 0 0 40px #241773; 
        }
        .display-area { 
            background: #241773; border: 2px solid #fbca04; padding: 20px; margin: 15px 0; 
            border-radius: 15px; min-height: 120px; display: flex; flex-direction: column; justify-content: center;
        }
        #suggestion { font-size: 42px; font-weight: 900; color: #fbca04; margin: 0; text-shadow: 2px 2px #000; }
        #reasoning { font-size: 13px; color: #ccc; margin-top: 8px; font-family: 'Segoe UI', sans-serif; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { 
            background: #9E7C0C; color: #000; border: 1px solid #fbca04; padding: 14px; 
            cursor: pointer; font-size: 12px; border-radius: 10px; font-weight: 800; text-transform: uppercase; 
        }
        button:hover { background: #fbca04; transform: scale(1.02); }
        .dist-btn { grid-column: span 2; background: #fff; color: #000; margin-bottom: 5px; }
        .reset-btn { background: #C60C30; color: white; grid-column: span 2; margin-top: 15px; border: none; }
    </style>
</head>
<body onload="callPlay(1)"> <div class="playbook-card">
    <div class="header">
        <h2 style="color:#fbca04; margin:0;">ASK JOSEPHNATHANIE</h2>
        <small>30TH ANNIVERSARY OFFENSE</small>
    </div>

    <div class="display-area">
        <h1 id="suggestion">...</h1>
        <p id="reasoning">Loading Play...</p>
    </div>

    <div class="grid">
        <button class="dist-btn" onclick="updateDist()">SET DISTANCE (AND ?)</button>
        <button onclick="callPlay(1)">1st Down</button>
        <button onclick="callPlay(2)">2nd Down</button>
        <button onclick="callPlay(3)">3rd Down</button>
        <button onclick="callPlay(4)">4th Down</button>
        <button onclick="resetAll()" class="reset-btn">Reset Drive</button>
    </div>
</div>

<script>
    let currentYards = 10;
    let memory = "PASS"; // Default tone is PASS
    let currentDown = 1;

    function updateDist() {
        let input = prompt("Yards to go?");
        if (input !== null && input !== "") {
            currentYards = parseInt(input);
            // Instant "And 5" Check
            if (currentYards === 5) {
                document.getElementById('suggestion').innerText = memory;
                document.getElementById('reasoning').innerText = "AND 5 RULE: Repeating " + memory + ".";
            } else {
                document.getElementById('suggestion').innerText = currentYards + " YDS";
                document.getElementById('reasoning').innerText = "Distance set. Pick your Down.";
            }
        }
    }

    function callPlay(down) {
        currentDown = down;
        let play = "";
        let logic = "";

        if (currentYards === 5) {
            play = memory;
            logic = "Repeat Rule: Doing what we did last play.";
        } else if (down === 1) {
            play = "PASS";
            logic = "1st Down: Always Pass to set the tone.";
        } else if (down === 2) {
            play = (currentYards < 5) ? "PASS" : "RUN";
            logic = (currentYards < 5) ? "2nd & Short: Air it out." : "2nd & Long: Ground attack.";
        } else if (down === 3) {
            play = (currentYards < 5) ? "RUN" : "PASS";
            logic = (currentYards < 5) ? "3rd & Short: Power Run." : "3rd & Long: Clutch Pass.";
        } else if (down === 4) {
            play = "SPECIAL TEAMS";
            logic = "Punt / FG / Go for it.";
        }

        if (play !== "SPECIAL TEAMS") memory = play;
        document.getElementById('suggestion').innerText = play;
        document.getElementById('reasoning').innerText = logic;
    }

    function resetAll() {
        currentYards = 10;
        currentDown = 1;
        memory = "PASS";
        callPlay(1);
    }
</script>
</body>
</html>
