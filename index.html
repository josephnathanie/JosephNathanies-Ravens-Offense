<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ravens: Josephnathanie Original Plan</title>
    <style>
        body { background: #241773; color: white; font-family: 'Arial Black', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .playbook-card { background: #000; border: 4px solid #9E7C0C; width: 350px; padding: 25px; border-radius: 15px; text-align: center; }
        .display { background: #1a1a1a; border: 2px solid #fff; padding: 25px; margin: 20px 0; border-radius: 10px; }
        #suggestion { font-size: 38px; color: #fbca04; margin: 0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { background: #241773; color: white; border: 1px solid #9E7C0C; padding: 15px; cursor: pointer; font-weight: bold; border-radius: 5px; }
        .dist-btn { grid-column: span 2; background: #fff; color: #000; }
    </style>
</head>
<body onload="play(1)">

<div class="playbook-card">
    <h2 style="margin:0; color:#fbca04;">ASK MADDEN</h2>
    <div class="display">
        <h1 id="suggestion">PASS</h1>
        <p id="reasoning" style="font-size:12px; color:#ccc;">1st Down: Set the tone.</p>
    </div>

    <div class="grid">
        <button class="dist-btn" onclick="setDist()">SET DISTANCE (AND ?)</button>
        <button onclick="play(1)">1ST DOWN</button>
        <button onclick="play(2)">2ND DOWN</button>
        <button onclick="play(3)">3RD DOWN</button>
        <button onclick="play(4)">4TH DOWN</button>
    </div>
</div>

<script>
    let yards = 10;
    let lastPlay = "PASS";

    function setDist() {
        let input = prompt("Yards to go?");
        if (input) {
            yards = parseInt(input);
            // Rule: If it's 5, immediately show the repeat play
            if (yards === 5) {
                document.getElementById('suggestion').innerText = lastPlay;
                document.getElementById('reasoning').innerText = "AND 5: Repeat what you did on previous down.";
            } else {
                document.getElementById('suggestion').innerText = yards + " YARDS";
                document.getElementById('reasoning').innerText = "Distance updated.";
            }
        }
    }

    function play(down) {
        let call = "";
        let note = "";

        // AND 5 RULE (Checks this first)
        if (yards === 5) {
            call = lastPlay;
            note = "Repeat Rule: Doing what you did on previous down.";
        } 
        // 1ST DOWN
        else if (down === 1) {
            call = "PASS";
            note = "1st Down: Always pass.";
        } 
        // 2ND DOWN
        else if (down === 2) {
            if (yards < 5) { call = "PASS"; note = "2nd & less than 5: Pass."; }
            else { call = "RUN"; note = "2nd & more than 5: Run."; }
        } 
        // 3RD DOWN
        else if (down === 3) {
            if (yards < 5) { call = "RUN"; note = "3rd & less than 5: Run."; }
            else { call = "PASS"; note = "3rd & more than 5: Pass."; }
        } 
        // 4TH DOWN
        else if (down === 4) {
            call = "SPECIAL TEAMS";
            note = "Consult with Special Teams Coach.";
        }

        if (call !== "SPECIAL TEAMS") lastPlay = call;
        document.getElementById('suggestion').innerText = call;
        document.getElementById('reasoning').innerText = note;
    }
</script>
</body>
</html>
