<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASK JOSEPH: RAVENS JOSEPHNATHANIE</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            background: radial-gradient(circle, #241773 0%, #120a3d 100%); 
            color: white; font-family: 'Arial Black', sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; padding: 15px;
        }
        .playbook-card { 
            background: rgba(0, 0, 0, 0.95); border: 4px solid #9E7C0C; 
            width: 100%; max-width: 400px; padding: 25px; border-radius: 25px; 
            text-align: center; box-shadow: 0 0 50px #241773; 
        }
        .logo { 
            width: 130px; height: auto; margin-bottom: 10px; 
            filter: drop-shadow(0 0 10px #fbca04);
        }
        .display-screen { 
            background: #241773; border: 3px solid #fbca04; padding: 20px; 
            margin: 15px 0; border-radius: 15px; min-height: 120px; 
            display: flex; flex-direction: column; justify-content: center;
        }
        #suggestion { font-size: 48px; color: #fbca04; margin: 0; text-shadow: 3px 3px #000; }
        #reasoning { 
            font-size: 13px; color: #fff; margin-top: 10px; 
            font-family: 'Segoe UI', sans-serif; text-transform: uppercase; 
            font-weight: 800; letter-spacing: 1px;
        }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        button { 
            background: #9E7C0C; color: black; border: 2px solid #fbca04; 
            padding: 18px 5px; cursor: pointer; font-size: 14px; 
            border-radius: 12px; font-weight: 900; transition: 0.1s;
        }
        button:active { background: #fbca04; transform: scale(0.96); }
        .dist-btn { grid-column: span 2; background: #fff; color: #000; border: none; margin-bottom: 8px; }
        .reset-btn { background: #C60C30; color: white; grid-column: span 2; margin-top: 15px; border: none; font-size: 12px; }
        h2 { font-size: 22px; margin: 0; color: #fbca04; }
    </style>
</head>
<body onload="play(1)">

<div class="playbook-card">
    <img src="https://static.www.baltimoreravens.com/assets/img/logos/30th-season-logo.png" alt="30th Season" class="logo" onerror="this.src='https://upload.wikimedia.org/wikipedia/en/1/16/Baltimore_Ravens_logo.svg'">

    <h2>ASK JOSEPH</h2>
    <p style="margin:0; font-size: 11px; color:#fff; opacity: 0.9;">RAVENS JOSEPHNATHANIE OFFENSE</p>
    
    <div class="display-screen">
        <h1 id="suggestion">PASS</h1>
        <p id="reasoning">1st Down: Setting the tone.</p>
    </div>

    <div class="grid">
        <button class="dist-btn" onclick="setDist()">SET DISTANCE (AND ?)</button>
        <button onclick="play(1)">1ST DOWN</button>
        <button onclick="play(2)">2ND DOWN</button>
        <button onclick="play(3)">3RD DOWN</button>
        <button onclick="play(4)">4TH DOWN</button>
        <button onclick="reset()" class="reset-btn">RESET DRIVE</button>
    </div>
</div>

<script>
    let currentYards = 10;
    let memory = "PASS";

    function setDist() {
        let input = prompt("Yards to go?");
        if (input !== null && input !== "") {
            currentYards = parseInt(input);
            updateUI();
        }
    }

    function updateUI() {
        if (currentYards === 5) {
            document.getElementById('suggestion').innerText = memory;
            document.getElementById('reasoning').innerText = "REPEAT PREVIOUS PLAY";
        } else {
            document.getElementById('suggestion').innerText = currentYards + " YARDS";
            document.getElementById('reasoning').innerText = "Select Down for Play Call";
        }
    }

    function play(down) {
        let call = "";
        let note = "";

        if (currentYards === 5) {
            call = memory;
            note = "REPEAT PREVIOUS PLAY";
        } 
        else if (down === 1) {
            call = "PASS";
            note = "1st Down: Setting the tone.";
        } 
        else if (down === 2) {
            if (currentYards < 5) {
                call = "PASS";
                note = "2nd & Less than 5: Pass.";
            } else {
                call = "RUN";
                note = "2nd & More than 5: Run.";
            }
        } 
        else if (down === 3) {
            if (currentYards < 5) {
                call = "RUN";
                note = "3rd & Less than 5: Run.";
            } else {
                call = "PASS";
                note = "3rd & More than 5: Pass.";
            }
        } 
        else if (down === 4) {
            call = "SPECIAL TEAMS";
            note = "Consult Special Teams Coach.";
        }

        if (call === "PASS" || call === "RUN") {
            memory = call;
        }

        document.getElementById('suggestion').innerText = call;
        document.getElementById('reasoning').innerText = note;
    }

    function reset() {
        currentYards = 10;
        memory = "PASS";
        play(1);
    }
</script>
</body>
</html>
