<div class="grid">
    <button onclick="updateSituation()">SET DISTANCE (AND ?)</button>
    <button onclick="play(1)">1ST DOWN</button>
    <button onclick="play(2)">2ND DOWN</button>
    <button onclick="play(3)">3RD DOWN</button>
    <button onclick="play(4)">4TH DOWN</button>
    <button onclick="reset()" class="reset-btn">RESET DRIVE</button>
</div>

<script>
    let currentDist = 10;
    let lastAction = "PASS"; // Default starting state
    let currentDown = 1;

    function updateSituation() {
        let d = prompt("Yards to go? (e.g., 10, 5, 2)");
        if (d !== null && d !== "") {
            currentDist = parseInt(d);
            
            // If the user sets it to exactly 5, trigger the logic immediately
            if (currentDist === 5) {
                document.getElementById('suggestion').innerText = lastAction;
                document.getElementById('reasoning').innerText = "Distance is 5: Repeating previous play type (" + lastAction + ").";
                updateStatus(currentDown);
            } else {
                document.getElementById('suggestion').innerText = "DISTANCE SET";
                document.getElementById('reasoning').innerText = "Now select your current Down.";
                updateStatus(currentDown);
            }
        }
    }

    function play(down) {
        currentDown = down;
        let call = "";
        let why = "";

        // 1. Check the "And 5" Repeat Rule first
        if (currentDist === 5) {
            call = lastAction;
            why = "Distance is 5: Repeating the " + lastAction + " from the previous down.";
        } 
        // 2. 1st Down Rule
        else if (down === 1) {
            call = "PASS";
            why = "1st Down: Josephnathanie Protocol (Always Pass).";
        }
        // 3. 2nd Down Logic
        else if (down === 2) {
            if (currentDist < 5) {
                call = "PASS";
                why = "2nd & Short (<5): Aerial attack.";
            } else {
                call = "RUN";
                why = "2nd & Long (>5): Ground game.";
            }
        }
        // 4. 3rd Down Logic
        else if (down === 3) {
            if (currentDist < 5) {
                call = "RUN";
                why = "3rd & Short (<5): Power Run.";
            } else {
                call = "PASS";
                why = "3rd & Long (>5): Deep Pass.";
            }
        }
        // 5. 4th Down Logic
        else if (down === 4) {
            call = "SPECIAL TEAMS";
            why = "Consult Special Teams Coach.";
        }

        // Save the action for the next "and 5" check
        if (call !== "SPECIAL TEAMS") {
            lastAction = call;
        }
        
        document.getElementById('suggestion').innerText = call;
        document.getElementById('reasoning').innerText = why;
        document.getElementById('last-play').innerText = lastAction;
        updateStatus(down);
    }

    function updateStatus(down) {
        document.getElementById('stat-line').innerText = down + " & " + currentDist;
    }

    function reset() {
        currentDist = 10;
        currentDown = 1;
        lastAction = "PASS";
        document.getElementById('suggestion').innerText = "READY";
        document.getElementById('reasoning').innerText = "New Drive. 1st Down set.";
        document.getElementById('last-play').innerText = "None";
        updateStatus(1);
    }
</script>
