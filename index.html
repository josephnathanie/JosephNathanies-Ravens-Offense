<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ravens: Josephnathanie Master Offense</title>
    <style>
        body { background: #241773; color: white; font-family: 'Arial Black', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .playbook-card { background: #000; border: 4px solid #9E7C0C; width: 350px; padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .header { border-bottom: 2px solid #9E7C0C; margin-bottom: 20px; padding-bottom: 10px; }
        .display-box { background: #1a1a1a; border: 2px solid #fff; padding: 25px; margin: 15px 0; border-radius: 10px; min-height: 100px; display: flex; flex-direction: column; justify-content: center; }
        #suggestion { font-size: 36px; font-weight: 900; color: #fbca04; margin: 0; text-shadow: 2px 2px #000; }
        #reasoning { font-size: 13px; color: #ccc; margin-top: 10px; font-family: 'Segoe UI', sans-serif; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { background: #241773; color: white; border: 1px solid #9E7C0C; padding: 12px; cursor: pointer; font-size: 14px; border-radius: 5px; font-weight: bold; text-transform: uppercase; }
        button:hover { background: #9E7C0C; color: black; }
        .dist-btn { grid-column: span 2; background: #fff; color: #000; border: none; margin-bottom: 5px; }
        .reset-btn { background: #444; grid-column: span 2; margin-top: 15px; border: none; font-size: 12px; }
    </style>
</head>
<body onload="processDown(1)">

<div class="playbook-card">
    <div class="header">
        <h2 style="margin:0;">ASK MADDEN</h2>
        <p style="color: #9E7C0C; margin:0; font-size: 12px;">JOSEPHNATHANIE OFFENSE</p>
    </div>

    <div class="display-box">
        <h1 id="suggestion">READY</h1>
        <p id="reasoning">Set distance to begin.</p>
    </div>

    <div class="grid">
        <button class="dist-btn" onclick="setDistance()">SET DISTANCE (AND ?)</button>
        <button onclick="processDown(1)">1ST DOWN</button>
        <button onclick="processDown(2)">2ND DOWN</button>
        <button onclick="processDown(3)">3RD DOWN</button>
        <button onclick="processDown(4)">4TH DOWN</button>
        <button onclick="resetDrive()" class="reset-btn">RESET DRIVE</button>
    </div>
</div>

<script>
    let currentDist = 10;
    let lastPlay = "PASS"; // Starts as PASS for 1st down

    function setDistance() {
        let d = prompt("Yards to go?");
        if (d !== null && d !== "") {
            currentDist = parseInt(d);
            // Instant check for "AND 5"
            if (currentDist === 5) {
                document.getElementById('suggestion').innerText = lastPlay;
                document.getElementById('reasoning').innerText = "AND 5: Doing what you did on previous down (" + lastPlay + ").";
            } else {
                document.getElementById('suggestion').innerText = currentDist + " YDS";
                document.getElementById('reasoning').innerText = "Distance set. Select current down.";
            }
        }
    }

    function processDown(down) {
        let call = "";
        let why = "";

        // RULE: IF DISTANCE IS EXACTLY 5
        if (currentDist === 5) {
            call = lastPlay;
            why = "Repeating " + lastPlay + " because it's 'And 5'.";
        } 
        // 1st DOWN
        else if (down === 1) {
            call = "PASS";
            why = "1st Down: Always Pass to set the tone.";
        } 
        // 2nd DOWN
        else if (down === 2) {
            if (currentDist < 5) {
                call = "PASS";
                why = "2nd & Short (<5): Aerial Attack.";
            } else {
                call = "RUN";
                why = "2nd & Long (>5): Ground Game.";
            }
        } 
        // 3rd DOWN
        else if (down === 3) {
            if (currentDist < 5) {
                call = "RUN";
                why = "3rd & Short (<5): Power Run.";
            } else {
                call = "PASS";
                why = "3rd & Long (>5): Clutch Pass.";
            }
        } 
        // 4th DOWN
        else if (down === 4) {
            call = "SPECIAL TEAMS";
            why = "Consult Special Teams Coach.";
        }

        // Save the play type for the next "And 5" check
        if (call !== "SPECIAL TEAMS") {
            lastPlay = call;
        }

        document.getElementById('suggestion').innerText = call;
        document.getElementById('reasoning').innerText = why;
    }

    function resetDrive() {
        currentDist = 10;
        lastPlay = "PASS";
        processDown(1);
    }
</script>

</body>
</html>
